apiVersion: apps/v1
kind: Deployment
metadata:
  name: ekart-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ekart
  template:
    metadata:
      labels:
        app: ekart
    spec:
      containers:
        - name: ekart
          image: nivisha/ekart:latest  # Use the correct Docker image name
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8070

---
apiVersion: v1
kind: Service
metadata:
  name: ekart-ssvc
spec:
  selector:
    app: ekart
  ports:
    - protocol: "TCP"
      port: 80  # The port that the service exposes
      targetPort: 8070  # The port your application listens on
  type: LoadBalancer
